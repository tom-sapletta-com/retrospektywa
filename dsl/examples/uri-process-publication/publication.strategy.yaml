strategy:
  id: source-once-publish-many
  input: book_source_revision

  capabilities:
    - source_inventory
    - editorial_validation
    - quarto_render
    - text_to_speech
    - process_pack_archive
    - docker_e2e
    - release_validation
    - github_publish
    - sites_publish
    - public_read_back

  rules:
    - generated_outputs_share_source_revision
    - provider_is_binding_not_strategy
    - external_commands_require_approval
    - dispatch_success_is_not_effect
    - preview_is_not_full_audiobook
    - paragraph_change_invalidates_receipt
