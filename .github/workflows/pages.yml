name: Publish Quarto book

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "content/**"
      - "dsl/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes espeak-ng ffmpeg zip
          python3 -m pip install --requirement scripts/requirements-dsl.txt
      - name: Generate and validate release
        run: |
          npm run release:generate
          npm run release:validate
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/_book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
