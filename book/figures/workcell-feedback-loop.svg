<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Cybernetyczna pętla WorkCell</title>
  <desc id="desc">Cel trafia do orchestratora, następnie do actora i środowiska. Validator mierzy dowód, a błąd wraca do orchestratora lub uruchamia eskalację.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf7}.box{fill:#fff;stroke:#a79f92;stroke-width:2}.dark{fill:#20201d}.red{fill:#f22b1d}
      .ink{fill:#20201d}.muted{fill:#6f685c}.white{fill:#fff}
      .arrow{fill:none;stroke:#f22b1d;stroke-width:4;marker-end:url(#head)}
      .feedback{fill:none;stroke:#82796b;stroke-width:3;stroke-dasharray:9 8;marker-end:url(#head2)}
      text{font-family:Arial,sans-serif}.title{font-family:Georgia,serif;font-size:30px}.body{font-size:17px}.label{font-size:15px;font-weight:700;letter-spacing:1.5px}
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" class="red"/></marker>
    <marker id="head2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#82796b"/></marker>
  </defs>
  <rect width="1200" height="560" class="bg"/>
  <text x="55" y="48" class="label red">WORKCELL / SPRZĘŻENIE ZWROTNE</text>
  <rect x="55" y="105" width="190" height="120" rx="4" class="box"/>
  <text x="150" y="154" text-anchor="middle" class="title ink">Cel</text>
  <text x="150" y="188" text-anchor="middle" class="body muted">r(t) · acceptance</text>
  <rect x="300" y="105" width="220" height="120" rx="4" class="dark"/>
  <text x="410" y="154" text-anchor="middle" class="title white">Orchestrator</text>
  <text x="410" y="188" text-anchor="middle" class="body white">π(e, state, R, B)</text>
  <rect x="575" y="105" width="190" height="120" rx="4" class="box"/>
  <text x="670" y="154" text-anchor="middle" class="title ink">Actor</text>
  <text x="670" y="188" text-anchor="middle" class="body muted">u(t) · działanie</text>
  <rect x="820" y="105" width="325" height="120" rx="4" class="box"/>
  <text x="982" y="154" text-anchor="middle" class="title ink">Environment</text>
  <text x="982" y="188" text-anchor="middle" class="body muted">wynik y(t) · zdarzenia</text>
  <path d="M245 165H290M520 165H565M765 165H810" class="arrow"/>
  <rect x="820" y="300" width="325" height="120" rx="4" class="dark"/>
  <text x="982" y="349" text-anchor="middle" class="title white">Validator</text>
  <text x="982" y="383" text-anchor="middle" class="body white">dowód · test · ryzyko</text>
  <path d="M982 225V290" class="arrow"/>
  <path d="M820 360H410V238" class="feedback"/>
  <text x="585" y="344" class="label red">e(t) / NASTĘPNY KROK</text>
  <rect x="55" y="300" width="240" height="120" rx="4" class="box"/>
  <text x="175" y="349" text-anchor="middle" class="title ink">Escalation</text>
  <text x="175" y="383" text-anchor="middle" class="body muted">brak R · budżet · wyjątek</text>
  <path d="M410 238V268H175V290" class="feedback"/>
  <text x="55" y="494" class="body muted">Model opisuje stan. Authority zezwala. Dowód zamyka pętlę.</text>
</svg>
