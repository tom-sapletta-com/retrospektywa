<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Od SOA do POA przez URI Process</title>
  <desc id="desc">Usługi publikują zdolności, proces URI składa je w plan, router wybiera wykonawcę, a weryfikacja zapisuje dowód efektu.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf7}.ink{fill:#20201d}.muted{fill:#6f685c}.red{fill:#f22b1d}
      .box{fill:#fff;stroke:#a79f92;stroke-width:2}.dark{fill:#20201d;stroke:#20201d;stroke-width:2}
      .line{fill:none;stroke:#82796b;stroke-width:3;stroke-dasharray:8 8}
      .arrow{fill:none;stroke:#f22b1d;stroke-width:4;marker-end:url(#head)}
      text{font-family:Arial,sans-serif}.label{font-size:18px;font-weight:700;letter-spacing:2px}
      .title{font-family:Georgia,serif;font-size:34px}.body{font-size:18px}.white{fill:#fff}
    </style>
    <marker id="head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" class="red"/></marker>
  </defs>
  <rect width="1200" height="560" class="bg"/>
  <text x="55" y="55" class="label red">SOA / ZDOLNOŚCI</text>
  <rect x="55" y="85" width="245" height="105" rx="4" class="box"/>
  <text x="82" y="127" class="title ink">Plesk</text><text x="82" y="161" class="body muted">DNS · pliki · TLS</text>
  <rect x="55" y="220" width="245" height="105" rx="4" class="box"/>
  <text x="82" y="262" class="title ink">GitHub</text><text x="82" y="296" class="body muted">commit · release · Pages</text>
  <rect x="55" y="355" width="245" height="105" rx="4" class="box"/>
  <text x="82" y="397" class="title ink">TTS</text><text x="82" y="431" class="body muted">tekst · głos · MP3</text>
  <path d="M315 138H405M315 273H405M315 408H405" class="line"/>
  <text x="405" y="55" class="label red">POA / PRZEBIEG</text>
  <rect x="405" y="85" width="365" height="375" rx="4" class="dark"/>
  <text x="438" y="132" class="title white">URI Process</text>
  <text x="438" y="180" class="body white">1. query inventory</text>
  <text x="438" y="222" class="body white">2. build formats</text>
  <text x="438" y="264" class="body white">3. verify contracts</text>
  <text x="438" y="306" class="body white">4. approval gate</text>
  <text x="438" y="348" class="body white">5. publish</text>
  <text x="438" y="390" class="body white">6. read-back effect</text>
  <path d="M608 180V374" class="arrow"/>
  <path d="M785 273H875" class="arrow"/>
  <text x="875" y="55" class="label red">DOWÓD</text>
  <rect x="875" y="85" width="270" height="375" rx="4" class="box"/>
  <text x="905" y="132" class="title ink">Receipt</text>
  <text x="905" y="185" class="body muted">route resolved</text>
  <text x="905" y="225" class="body muted">policy accepted</text>
  <text x="905" y="265" class="body muted">output valid</text>
  <text x="905" y="305" class="body muted">effect verified</text>
  <text x="905" y="345" class="body muted">artifact hashed</text>
  <rect x="905" y="380" width="208" height="45" rx="3" class="red"/>
  <text x="930" y="410" class="label white">EQL: GREEN</text>
  <text x="55" y="520" class="body muted">Usługa daje możliwość. Proces daje kontrolowany, adresowalny i sprawdzalny efekt.</text>
</svg>
